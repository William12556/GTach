behavior:
  expected: >
    Six configurable RPM colour bands (blue, black, green, yellow, orange, red).
    Thresholds loaded from a selected engine profile YAML. Distinct danger_start
    and redline_rpm thresholds. Pulsing background at 2 Hz from danger_start
    through redline band. One-time operator safety acknowledgement on first run
    and after any threshold or profile change. Acknowledgement state persisted
    to a separate state file. Engine profile YAML loaded at startup; re-loadable
    in setup mode.
  actual: >
    Four fixed bands (black, green, yellow, red) with hard-coded thresholds.
    No engine profile selection. No pulsing alert. No acknowledgement screen.
    Thresholds not user-configurable.
  impact: >
    Visual RPM warning is not optimised for specific engine characteristics.
    No advance warning before redline. No operator confirmation of threshold accuracy.
  workaround: "None. Thresholds are hard-coded."

environment:
  python_version: "3.11"
  os: "Raspberry Pi OS (Debian 12) / macOS (Apple Silicon)"
  dependencies:
    - library: "pygame"
      version: "2.6.1"
    - library: "PyYAML"
      version: ""
  domain: "domain_1"

analysis:
  root_cause: >
    REQ c3d4e5f6 was specified as fixed bands for implementation simplicity.
    Enhancement extends that design; it does not fix a defect.
  technical_notes: >
    Six changes required:
    (1) DisplayRenderingEngine: replace four-band lookup with six-band configurable
        lookup; add pulse state toggle using pygame.time.get_ticks() at danger_start
        and redline_rpm; pulse colour reflects active band.
    (2) ConfigManager: extend YAML schema with rpm_bands sub-section (idle_max,
        torque_start, caution_start, warning_start, danger_start, redline_rpm);
        add engine_profile field; add validation enforcing strictly ascending order;
        add engine_profiles.yaml load at startup.
    (3) DisplayManager: add acknowledgement display state; add engine profile
        selection state; wire acknowledgement trigger on first run and post-config-change.
    (4) SetupDisplayManager: add profile selection UI and reload of engine_profiles.yaml
        in setup mode.
    (5) New data artefact: engine_profiles.yaml shipped with application; minimum
        three profiles (abarth_595_turismo, generic_turbo_4cyl, generic_na_4cyl).
    (6) New state artefact: separate acknowledgement state file, independent of
        YAML config.
    New display states (acknowledgement screen, profile selection) must be added
    to the state machine in design-gtach-master §13.4.
  related_issues: []

