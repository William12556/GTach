  id: "issue-3f7a1b9c"
  title: "RPM colour band enhancement — six configurable bands, engine profiles, acknowledgement, redline pulse"
  date: "2026-04-23"
  reporter: "William Watson"
  status: "closed"
  severity: "medium"
  type: "enhancement"
  iteration: 1
  coupled_docs:
