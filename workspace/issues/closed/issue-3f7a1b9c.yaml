source:
  origin: "requirement_change"
  test_ref: ""
  description: >
    REQ c3d4e5f6 implements four fixed, hard-coded RPM colour bands. This
    enhancement replaces that model with six configurable bands, operator-selectable
    engine profiles, distinct danger_start and redline_rpm thresholds, a pulsing
    background alert beginning at danger_start, and a one-time operator safety
    acknowledgement screen. Full rationale and scope documented in
    workspace/proposal/proposal-rpm-colour-bands-enhancement.md (v0.5).

